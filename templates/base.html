<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Papelería Compu Click{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
    <div class="container-fluid px-5">
        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('inicio') }}">
            <span class="ms-2">Compu Click</span>
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('ver_inventario') }}">Inventario</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('contactos') }}">Contactos</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">Acerca de</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('registro') }}">Registro</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('ver_datos') }}">Archivos</a></li>
            </ul>
        </div>
    </div>
</nav>

<div style="margin-top: 80px;"></div>

{% block content %}
{% endblock %}

<footer class="footer">
    <p>© 2026 Papelería Compu Click - Tena</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
