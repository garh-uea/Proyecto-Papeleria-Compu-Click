{% extends "base.html" %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<section class="container my-5">
    <h2 class="text-center mb-4">Editar Producto</h2>

    {% if producto %}

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" 
                   name="nombre" 
                   class="form-control" 
                   value="{{ producto[1] }}" 
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" 
                   name="cantidad" 
                   class="form-control" 
                   value="{{ producto[2] }}" 
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" 
                   step="0.01"
                   name="precio" 
                   class="form-control" 
                   value="{{ producto[3] }}" 
                   required>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success">
                Actualizar
            </button>

            <a href="{{ url_for('ver_inventario') }}" 
               class="btn btn-secondary">
                Cancelar
            </a>
        </div>

    </form>

    {% else %}
        <p class="text-danger text-center">Producto no encontrado.</p>
    {% endif %}

</section>
{% endblock %}
