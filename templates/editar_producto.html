{% extends "base.html" %}
{% block title %}Editar Producto{% endblock %}

{% block content %}

<section class="container my-5">

<h2 class="text-center mb-4">Editar Producto</h2>

{% if producto %}

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Nombre</label>
<input type="text" name="nombre" value="{{ producto[1] }}" class="form-control" required>
</div>

<div class="mb-3">
<label>Precio</label>
<input type="number" step="0.01" name="precio" value="{{ producto[2] }}" class="form-control" required>
</div>

<div class="mb-3">
<label>Stock</label>
<input type="number" name="stock" value="{{ producto[3] }}" class="form-control" required>
</div>

<!-- IMAGEN ACTUAL -->
<div class="mb-3 text-center">
    <label class="form-label">Imagen Actual</label><br>

    {% if producto[4] %}
        <img src="{{ url_for('static', filename='img_productos/' + producto[4]) }}" 
             class="img-fluid rounded shadow" 
             style="max-width: 200px;">
    {% else %}
        <p class="text-muted">No hay imagen</p>
    {% endif %}
</div>

<!-- CAMBIAR IMAGEN -->
<div class="mb-3">
<label>Cambiar Imagen</label>
<input type="file" name="imagen" class="form-control">
</div>

<div class="text-center">
<button class="btn btn-success">Actualizar</button>
<a href="{{ url_for('ver_inventario') }}" class="btn btn-secondary">Cancelar</a>
</div>

</form>

{% else %}
<p class="text-danger text-center">Producto no encontrado</p>
{% endif %}

</section>

{% endblock %}
